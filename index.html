<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Music Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #06060E;
  --s1:      #0C0C18;
  --s2:      #121220;
  --s3:      #1A1A2E;
  --bdr:     #252538;
  --bdr2:    #1E1E30;
  --t1:      #F5F5FF;
  --t2:      #8080AA;
  --t3:      #3A3A55;
  --acc:     #E040FB;
  --acc2:    #AA00FF;
  --grn:     #00E5A0;
  --grn2:    #00B07A;
  --ylw:     #FFD740;
  --red:     #FF5252;
  --blue:    #448AFF;
  --r:       12px;
  --rsm:     8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg)}
body{
  font-family:'Syne',sans-serif;color:var(--t1);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;overflow-x:hidden;
}

/* ── BG FX ── */
.bg-fx{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 5% 30%, rgba(224,64,251,.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 95% 70%, rgba(0,229,160,.05) 0%,transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 100%, rgba(68,138,255,.04) 0%,transparent 60%);
}
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;
  background-image:
    linear-gradient(var(--bdr) 1px,transparent 1px),
    linear-gradient(90deg,var(--bdr) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ── LAYOUT ── */
#app{
  position:relative;z-index:1;
  max-width:780px;margin:0 auto;
  padding:0 20px 80px;min-height:100vh;
}

/* ── HEADER ── */
header{
  padding:28px 0 36px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.logo-block{}
.logo-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:500;
  color:var(--acc);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.logo-eyebrow::before{
  content:'';width:20px;height:1px;background:var(--acc);
}
.logo-title{
  font-size:clamp(26px,5vw,38px);font-weight:800;
  letter-spacing:-1.5px;line-height:1;
  color:var(--t1);
}
.logo-title em{
  font-style:normal;
  background:linear-gradient(90deg,var(--acc),var(--grn));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.api-key-wrap{
  display:flex;align-items:center;gap:8px;
}
.api-key-input{
  background:var(--s2);border:1.5px solid var(--bdr);border-radius:var(--rsm);
  padding:8px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;
  color:var(--t2);outline:none;width:160px;
  transition:border-color .2s,color .2s;
}
.api-key-input:focus{border-color:var(--acc);color:var(--t1);}
.api-key-input::placeholder{color:var(--t3);}
.key-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--t3);flex-shrink:0;
  transition:background .3s;
}
.key-dot.ok{background:var(--grn);box-shadow:0 0 8px var(--grn);}

/* ── PROMPT CARD ── */
.prompt-card{
  background:var(--s1);border:1px solid var(--bdr);border-radius:16px;
  padding:24px;margin-bottom:20px;position:relative;overflow:hidden;
}
.prompt-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--acc),var(--grn),transparent);
}
.pc-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:700;color:var(--t3);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:12px;
}
.prompt-input{
  width:100%;min-height:80px;resize:vertical;
  background:var(--s2);border:1.5px solid var(--bdr);border-radius:var(--rsm);
  padding:14px 16px;font-size:14px;font-family:'Syne',sans-serif;
  color:var(--t1);outline:none;line-height:1.6;
  transition:border-color .2s;
}
.prompt-input:focus{border-color:var(--acc);}
.prompt-input::placeholder{color:var(--t3);}

/* 프리셋 태그 */
.preset-row{
  display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 16px;
}
.ptag{
  padding:5px 12px;border-radius:20px;
  background:var(--s2);border:1px solid var(--bdr);
  font-size:11px;font-weight:600;color:var(--t2);
  cursor:pointer;transition:all .15s;
}
.ptag:hover{border-color:var(--acc);color:var(--acc);}
.ptag.on{
  background:rgba(224,64,251,.12);border-color:var(--acc);color:var(--acc);
}

/* 옵션 행 */
.options-row{
  display:grid;grid-template-columns:1fr 1fr auto;gap:10px;
  margin-bottom:16px;
  align-items:end;
}
.opt-group{display:flex;flex-direction:column;gap:6px;}
.opt-label{
  font-size:10px;font-weight:700;color:var(--t3);
  letter-spacing:1px;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
}
.opt-input,.opt-select{
  background:var(--s2);border:1.5px solid var(--bdr);border-radius:var(--rsm);
  padding:10px 12px;font-size:13px;font-family:'Syne',sans-serif;
  color:var(--t1);outline:none;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.opt-input:focus,.opt-select:focus{border-color:var(--acc);}
.opt-input::placeholder{color:var(--t3);}
.opt-select{
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%233A3A55' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 10px center;
  padding-right:28px;cursor:pointer;
}
.opt-select option{background:var(--s2);}

/* 인스트루멘탈 토글 */
.toggle-wrap{
  display:flex;flex-direction:column;gap:6px;
}
.toggle-label-row{
  display:flex;align-items:center;gap:8px;
  cursor:pointer;padding:10px 12px;
  background:var(--s2);border:1.5px solid var(--bdr);border-radius:var(--rsm);
  transition:border-color .15s;
}
.toggle-label-row:hover{border-color:var(--bdr2);}
.toggle-label-row.on{border-color:var(--acc);}
.toggle-switch{
  width:28px;height:16px;border-radius:8px;background:var(--s3);
  position:relative;flex-shrink:0;transition:background .2s;
}
.toggle-label-row.on .toggle-switch{background:var(--acc);}
.toggle-thumb{
  position:absolute;width:12px;height:12px;border-radius:50%;
  background:#fff;top:2px;left:2px;transition:transform .2s;
}
.toggle-label-row.on .toggle-thumb{transform:translateX(12px);}
.toggle-txt{font-size:12px;font-weight:600;color:var(--t2);}
.toggle-label-row.on .toggle-txt{color:var(--acc);}

/* 생성 버튼 */
.gen-btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  border:none;border-radius:var(--rsm);
  font-size:15px;font-weight:800;font-family:'Syne',sans-serif;
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:opacity .15s,transform .1s;
  letter-spacing:-.3px;
}
.gen-btn:hover{opacity:.92;}
.gen-btn:active{transform:scale(.98);}
.gen-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.gen-spinner{
  width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:gspin .7s linear infinite;display:none;
}
@keyframes gspin{to{transform:rotate(360deg)}}

/* ── LOADING STATE ── */
.loading-card{
  display:none;
  background:var(--s1);border:1px solid var(--bdr);border-radius:16px;
  padding:32px 24px;margin-bottom:20px;text-align:center;
}
.loading-card.on{display:block;}
.ld-waveform{
  display:flex;align-items:center;justify-content:center;
  gap:4px;height:40px;margin-bottom:20px;
}
.ld-bar{
  width:4px;border-radius:2px;
  background:linear-gradient(to top,var(--acc),var(--grn));
  animation:ldwave 1.2s ease-in-out infinite;
}
.ld-bar:nth-child(1){height:10px;animation-delay:0s}
.ld-bar:nth-child(2){height:24px;animation-delay:.1s}
.ld-bar:nth-child(3){height:36px;animation-delay:.2s}
.ld-bar:nth-child(4){height:28px;animation-delay:.3s}
.ld-bar:nth-child(5){height:40px;animation-delay:.15s}
.ld-bar:nth-child(6){height:20px;animation-delay:.25s}
.ld-bar:nth-child(7){height:12px;animation-delay:.35s}
@keyframes ldwave{
  0%,100%{transform:scaleY(.3);opacity:.4}
  50%{transform:scaleY(1);opacity:1}
}
.ld-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.ld-sub{font-size:12px;color:var(--t2);line-height:1.7;}
.ld-progress{
  margin-top:20px;height:2px;background:var(--bdr);
  border-radius:10px;overflow:hidden;
}
.ld-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,var(--acc2),var(--grn));
  width:0;animation:ldprog 30s ease-out forwards;
}
@keyframes ldprog{0%{width:0}70%{width:75%}90%{width:90%}100%{width:95%}}
.ld-task{
  margin-top:12px;font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--t3);
}

/* ── RESULTS ── */
#results{margin-top:4px;}

.result-card{
  background:var(--s1);border:1px solid var(--bdr);border-radius:16px;
  overflow:hidden;margin-bottom:16px;
  animation:cardIn .4s ease both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.rc-cover{
  width:100%;aspect-ratio:16/5;
  object-fit:cover;display:block;background:var(--s2);
  position:relative;
}
.rc-cover-img{
  width:100%;height:100%;object-fit:cover;
}
.rc-cover-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(6,6,14,.9));
}
.rc-cover-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--s2),var(--s3));
  font-size:48px;
}
.rc-body{padding:20px 20px 16px;}
.rc-title{
  font-size:18px;font-weight:800;letter-spacing:-.5px;
  margin-bottom:4px;
}
.rc-meta{
  font-size:11px;color:var(--t2);
  font-family:'JetBrains Mono',monospace;
  margin-bottom:16px;
}
.rc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.rc-tag{
  padding:3px 9px;border-radius:6px;
  font-size:10px;font-weight:700;
  background:var(--s3);color:var(--t2);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.5px;text-transform:uppercase;
}
.rc-tag.hl{background:rgba(224,64,251,.12);color:var(--acc);}

/* ── AUDIO PLAYER ── */
.audio-player{
  background:var(--s2);border-radius:10px;
  padding:14px 16px;
}
.ap-top{
  display:flex;align-items:center;gap:12px;margin-bottom:10px;
}
.ap-play-btn{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  border:none;cursor:pointer;color:#fff;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:transform .12s,box-shadow .12s;
  box-shadow:0 0 0 rgba(224,64,251,0);
}
.ap-play-btn:hover{
  transform:scale(1.06);
  box-shadow:0 0 20px rgba(224,64,251,.4);
}
.ap-play-btn:active{transform:scale(.94);}
.ap-info{flex:1;min-width:0;}
.ap-track{
  font-size:13px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:2px;
}
.ap-time{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--t3);
}
.ap-download{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:var(--s3);border:1px solid var(--bdr);
  color:var(--t2);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;text-decoration:none;
  transition:all .15s;
}
.ap-download:hover{border-color:var(--grn);color:var(--grn);}
/* 프로그레스 */
.ap-prog-wrap{cursor:pointer;padding:4px 0;}
.ap-prog-track{
  height:4px;background:var(--bdr);border-radius:10px;
  position:relative;overflow:visible;
}
.ap-prog-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,var(--acc2),var(--acc));
  width:0;transition:width .1s linear;
  position:relative;
}
.ap-prog-fill::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;background:var(--acc);
  opacity:0;transition:opacity .15s;
}
.ap-prog-wrap:hover .ap-prog-fill::after{opacity:1;}
/* 시각화 */
.ap-viz{
  display:flex;align-items:flex-end;gap:1.5px;height:24px;
  margin-top:10px;
}
.ap-vbar{
  flex:1;border-radius:2px;
  background:linear-gradient(to top,var(--acc2),var(--acc));
  opacity:.15;height:3px;
  transition:height .07s,opacity .07s;
}
.ap-vbar.on{opacity:.7;}

/* 두 번째 트랙 구분 */
.result-card + .result-card{margin-top:0;}
.dual-label{
  font-size:10px;font-weight:700;color:var(--t3);
  letter-spacing:2px;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
  margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.dual-label::after{content:'';flex:1;height:1px;background:var(--bdr);}

/* ── HISTORY ── */
.history-section{margin-top:32px;}
.section-label{
  font-size:10px;font-weight:700;color:var(--t3);
  letter-spacing:2px;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
  margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--bdr2);}
.history-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
}
.hist-card{
  background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:all .15s;
}
.hist-card:hover{border-color:var(--bdr);transform:translateY(-2px);}
.hist-thumb{
  width:100%;aspect-ratio:16/9;background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;overflow:hidden;
}
.hist-thumb img{width:100%;height:100%;object-fit:cover;}
.hist-info{padding:10px;}
.hist-title{font-size:12px;font-weight:700;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-sub{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--s2);border:1px solid var(--bdr);
  color:var(--t1);padding:10px 18px;
  border-radius:10px;font-size:12px;font-weight:700;
  opacity:0;pointer-events:none;z-index:999;
  transition:all .2s;white-space:nowrap;
  font-family:'JetBrains Mono',monospace;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--grn);color:var(--grn);}
#toast.err{border-color:var(--red);color:var(--red);}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .options-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
  .toggle-wrap{grid-column:1/-1;}
  header{flex-direction:column;align-items:flex-start;gap:16px;}
  .history-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="bg-fx"></div>
<div class="bg-grid"></div>

<div id="app">
  <header>
    <div class="logo-block">
      <div class="logo-eyebrow">Powered by Suno AI</div>
      <div class="logo-title">AI <em>Music</em> Studio</div>
    </div>
    <div class="api-key-wrap">
      <div class="key-dot" id="key-dot"></div>
      <input class="api-key-input" id="api-key" type="password" placeholder="kie.ai API Key">
    </div>
  </header>

  <!-- PROMPT CARD -->
  <div class="prompt-card">
    <div class="pc-label">프롬프트</div>
    <textarea class="prompt-input" id="prompt" rows="3"
      placeholder="어떤 음악을 만들까요? (예: 잔잔한 Lo-Fi 피아노 새벽 감성, 강렬한 EDM 드롭, 감성적인 K-Pop 발라드...)"></textarea>

    <div class="preset-row" id="preset-row"></div>

    <div class="options-row">
      <div class="opt-group">
        <div class="opt-label">장르 / 스타일</div>
        <input class="opt-input" id="style" placeholder="lo-fi, piano, chill..." type="text">
      </div>
      <div class="opt-group">
        <div class="opt-label">곡 분위기</div>
        <select class="opt-select" id="mood">
          <option value="">선택 안함</option>
          <option value="happy, uplifting">밝고 신나는</option>
          <option value="sad, emotional">슬프고 감성적인</option>
          <option value="calm, relaxing">잔잔하고 편안한</option>
          <option value="dark, intense">어둡고 강렬한</option>
          <option value="romantic, dreamy">로맨틱하고 몽환적인</option>
          <option value="epic, cinematic">웅장하고 영화적인</option>
          <option value="energetic, hype">에너지 넘치는</option>
        </select>
      </div>
      <div class="toggle-wrap">
        <div class="opt-label">인스트루멘탈</div>
        <div class="toggle-label-row" id="inst-toggle">
          <div class="toggle-switch"><div class="toggle-thumb"></div></div>
          <span class="toggle-txt">보컬 없음</span>
        </div>
      </div>
    </div>

    <button class="gen-btn" id="gen-btn">
      <span class="gen-spinner" id="gen-spinner"></span>
      <span id="gen-txt">✦ 음악 생성하기</span>
    </button>
  </div>

  <!-- LOADING -->
  <div class="loading-card" id="loading-card">
    <div class="ld-waveform">
      <div class="ld-bar"></div><div class="ld-bar"></div>
      <div class="ld-bar"></div><div class="ld-bar"></div>
      <div class="ld-bar"></div><div class="ld-bar"></div>
      <div class="ld-bar"></div>
    </div>
    <div class="ld-title">AI가 음악을 작곡하고 있어요</div>
    <div class="ld-sub" id="ld-sub">Suno AI가 멜로디와 리듬을 구성 중...<br>보통 20~40초 정도 소요됩니다</div>
    <div class="ld-progress"><div class="ld-fill" id="ld-fill"></div></div>
    <div class="ld-task" id="ld-task"></div>
  </div>

  <!-- RESULTS -->
  <div id="results"></div>

  <!-- HISTORY -->
  <div class="history-section" id="history-section" style="display:none">
    <div class="section-label">최근 생성</div>
    <div class="history-grid" id="history-grid"></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ═══ CONFIG ═══ */
const KIE_BASE = 'https://api.kie.ai';
const POLL_INTERVAL = 3000;
const MAX_POLLS = 40;

const PRESETS = [
  '🌙 Lo-Fi 새벽', '🎵 K-Pop 발라드', '⚡ EDM 드롭',
  '🎷 재즈 카페', '🎸 인디 팝', '🌊 Synthwave',
  '🎬 영화 OST', '🥁 트랩 비트', '🌿 Acoustic',
];

const PRESET_MAP = {
  '🌙 Lo-Fi 새벽':    { style:'lo-fi, hip hop, piano',         mood:'calm, relaxing',    ph:'[Verse]\n창밖에 빗소리가 들려\n혼자 앉아 커피를 마셔\n\n[Chorus]\n이 새벽이 영원하길...' },
  '🎵 K-Pop 발라드':  { style:'k-pop, ballad, piano, strings',  mood:'sad, emotional',    ph:'[Verse]\n네가 떠난 자리에\n아직 네 향기가 남아\n\n[Chorus]\n사랑한다는 말 한마디...' },
  '⚡ EDM 드롭':      { style:'EDM, electronic, festival',       mood:'energetic, hype',   ph:'[Verse]\nFeel the bass drop tonight\nWe are alive\n\n[Chorus]\nLet the music take control...' },
  '🎷 재즈 카페':     { style:'jazz, smooth, saxophone',         mood:'calm, relaxing',    ph:'[Verse]\n달빛이 내리는 카페\n재즈 선율이 흘러\n\n[Chorus]\n그대와 이 밤을...' },
  '🎸 인디 팝':       { style:'indie pop, guitar',               mood:'happy, uplifting',  ph:'[Verse]\n오늘 하루도 별거 없었어\n그래도 괜찮아\n\n[Chorus]\n우리 그냥 웃자...' },
  '🌊 Synthwave':    { style:'synthwave, retrowave, 80s',        mood:'romantic, dreamy',  ph:'[Verse]\nNeon lights in the rain\nDriving through the night\n\n[Chorus]\nForever in this 80s dream...' },
  '🎬 영화 OST':     { style:'cinematic, orchestral',            mood:'epic, cinematic',   ph:'[Verse]\n세상의 끝에서\n우리는 서로를 찾았어\n\n[Chorus]\n이 순간이 영원하길...' },
  '🥁 트랩 비트':    { style:'trap, hip hop, 808',               mood:'dark, intense',     ph:'[Verse]\n새벽 3시 스튜디오\n펜을 잡고 종이를 채워\n\n[Hook]\n내 꿈은 멈추지 않아...' },
  '🌿 Acoustic':    { style:'acoustic, folk, guitar',            mood:'calm, relaxing',    ph:'[Verse]\n봄바람이 불어오는 날\n너의 손을 잡고 걸었어\n\n[Chorus]\n그 기억이 지금도...' },
};

/* ═══ STATE ═══ */
let history = JSON.parse(localStorage.getItem('ams_history') || '[]');
let activeAudio = null;
let activeVizTimer = null;
let instOn = false;
let toastTmr = null;

/* ═══ DOM ═══ */
const $ = id => document.getElementById(id);

function toast(msg, type='', dur=2800) {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'on' + (type ? ' '+type : '');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.className = '', dur);
}

/* ═══ PRESETS ═══ */
const DEFAULT_PH = '✍️ 여기에 가사를 입력하세요\n\n예시:\n[Verse]\n가사 첫 번째 줄\n가사 두 번째 줄\n\n[Chorus]\n후렴구 가사...';

function renderPresets() {
  const row = $('preset-row');
  const promptEl = $('prompt');

  row.innerHTML = PRESETS.map(p =>
    `<div class="ptag" data-p="${p}">${p}</div>`
  ).join('');

  // 기본 placeholder
  promptEl.placeholder = DEFAULT_PH;

  row.querySelectorAll('.ptag').forEach(tag => {
    tag.addEventListener('click', function() {
      row.querySelectorAll('.ptag').forEach(t => t.classList.remove('on'));
      this.classList.toggle('on', !this.classList.contains('_was_on'));

      const isOn = this.classList.contains('on');
      const map = PRESET_MAP[this.dataset.p];
      if (!map) return;

      if (isOn) {
        // 장르/스타일/분위기 세팅
        $('style').value = map.style;
        const moodSel = $('mood');
        Array.from(moodSel.options).forEach(o => { o.selected = o.value === map.mood; });

        // 프롬프트 비우고 placeholder를 예시 가사로 교체 + 포커스
        if (!promptEl.value.trim()) {
          promptEl.placeholder = '✍️ 가사를 입력하세요\n\n' + map.ph;
        }
        promptEl.focus();
        // 스크롤
        promptEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        toast('✍️ 가사를 입력하면 음악이 만들어져요!', '', 2200);
      }
    });
  });
}

/* ═══ API KEY ═══ */
$('api-key').addEventListener('input', function() {
  $('key-dot').className = 'key-dot' + (this.value.length > 10 ? ' ok' : '');
});
// 로컬스토리지에서 복원
const savedKey = localStorage.getItem('ams_key');
if (savedKey) { $('api-key').value = savedKey; $('key-dot').className = 'key-dot ok'; }
$('api-key').addEventListener('change', function() {
  if (this.value) localStorage.setItem('ams_key', this.value);
});

/* ═══ TOGGLE ═══ */
$('inst-toggle').addEventListener('click', function() {
  instOn = !instOn;
  this.classList.toggle('on', instOn);
});

/* ═══ GENERATE ═══ */
$('gen-btn').addEventListener('click', generate);
$('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) generate();
});

/* ── kie.ai 직접 호출 ── */
async function kieRequest(kieKey, method, path, body) {
  const url = `https://api.kie.ai${path}`;
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${kieKey}`,
    },
  };
  if (body && method !== 'GET') opts.body = JSON.stringify(body);

  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error || data?.msg || data?.message || `API 오류 ${res.status}`);
  return data;
}

async function generate() {
  const apiKey = $('api-key').value.trim();
  if (!apiKey) { toast('kie.ai API 키를 입력해주세요', 'err'); return; }

  const lyrics = $('prompt').value.trim();
  const style = $('style').value.trim();
  const mood  = $('mood').value;
  const isInst = instOn;
  const tags = [style, mood].filter(Boolean).join(', ');

  if (!lyrics && !style) { toast('가사 또는 장르를 입력해주세요', 'err'); return; }

  // prompt = 가사가 있으면 가사, 없으면 장르/스타일 설명
  const prompt = lyrics || (style + (mood ? ', ' + mood : ''));

  $('gen-btn').disabled = true;
  $('gen-spinner').style.display = 'block';
  $('gen-txt').textContent = '생성 중...';
  $('loading-card').classList.add('on');
  $('results').innerHTML = '';

  const fill = $('ld-fill');
  fill.style.animation = 'none'; void fill.offsetWidth; fill.style.animation = '';

  try {
    // 1. 생성 요청
    $('ld-sub').innerHTML = 'kie.ai에 작곡 요청 중...<br>잠시만 기다려주세요 ☕';
    const genData = await kieRequest(apiKey, 'POST', '/api/v1/generate', {
      prompt,
      style: style || undefined,
      customMode: !!(style || isInst),
      instrumental: isInst,
      model: 'V3_5',
      callBackUrl: 'https://ai-music-studio-bice.vercel.app/api/callback',
    });

    const taskId = genData?.data?.taskId || genData?.taskId;
    // kie.ai v1 응답: { code:200, data:{ taskId:"..." } }
    if (!taskId) throw new Error('taskId 없음 — API 응답: ' + JSON.stringify(genData).slice(0,120));

    $('ld-task').textContent = `Task: ${taskId}`;
    $('ld-sub').innerHTML = 'AI가 멜로디, 리듬, 편곡 중...<br>보통 30~60초 소요됩니다 ☕';

    // 2. 폴링
    const tracks = await pollResult(apiKey, taskId);
    if (!tracks?.length) throw new Error('트랙을 받지 못했어요');

    // 3. 렌더
    $('loading-card').classList.remove('on');
    renderTracks(tracks, prompt, tags);

    tracks.forEach(t => {
      history.unshift({
        id: t.id,
        title: t.title || '무제',
        audio_url: t.audioUrl || t.audio_url,
        image_url: t.imageUrl || t.image_url,
        tags: t.tags || tags,
        created: Date.now(),
      });
    });
    history = history.slice(0, 20);
    localStorage.setItem('ams_history', JSON.stringify(history));
    renderHistory();
    toast('🎵 음악 생성 완료!', 'ok');

  } catch(e) {
    $('loading-card').classList.remove('on');
    toast('❌ ' + e.message, 'err', 5000);
    console.error(e);
  } finally {
    $('gen-btn').disabled = false;
    $('gen-spinner').style.display = 'none';
    $('gen-txt').textContent = '✦ 음악 생성하기';
  }
}

async function pollResult(apiKey, taskId) {
  for (let i = 0; i < MAX_POLLS; i++) {
    await sleep(POLL_INTERVAL);
    try {
      const data = await kieRequest(apiKey, 'GET', `/api/v1/generate/record-info?taskId=${taskId}`);
      const st = data?.data;
      if (!st) continue;

      const status = (st.status || '').toUpperCase();
      const tracks = st.response?.sunoData || [];

      $('ld-sub').innerHTML = `상태: <b style="color:var(--acc)">${status || '처리 중'}</b><br>음악을 완성하고 있어요...`;

      if (status === 'SUCCESS' && tracks.length) return tracks;
      if (status === 'FAILED' || status === 'ERROR') throw new Error('생성 실패');
    } catch(e) {
      if (e.message === '생성 실패') throw e;
    }
  }
  throw new Error('시간 초과 — 다시 시도해주세요');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ═══ RENDER TRACKS ═══ */
function renderTracks(tracks, prompt, tags) {
  const container = $('results');
  container.innerHTML = '';

  tracks.forEach((track, i) => {
    const audioUrl = track.audioUrl || track.audio_url || '';
    const imageUrl = track.imageUrl || track.image_url || '';
    const title = track.title || `트랙 ${i+1}`;
    const trackTags = (track.tags || tags || '').split(',').map(t=>t.trim()).filter(Boolean);
    const dur = track.duration ? formatTime(track.duration) : '—';

    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="rc-cover">
        ${imageUrl
          ? `<img class="rc-cover-img" src="${imageUrl}" alt="">`
          : `<div class="rc-cover-placeholder">🎵</div>`}
        <div class="rc-cover-overlay"></div>
      </div>
      <div class="rc-body">
        ${i > 0 ? `<div class="dual-label">버전 ${i+1}</div>` : ''}
        <div class="rc-title">${esc(title)}</div>
        <div class="rc-meta">${esc(prompt.slice(0,60))}${prompt.length>60?'...':''} · ${dur}</div>
        <div class="rc-tags">
          ${trackTags.slice(0,6).map((t,j) =>
            `<span class="rc-tag${j<2?' hl':''}">${esc(t)}</span>`
          ).join('')}
        </div>
        <div class="audio-player" id="player-${i}">
          <div class="ap-top">
            <button class="ap-play-btn" data-idx="${i}" data-url="${esc(audioUrl)}">▶</button>
            <div class="ap-info">
              <div class="ap-track">${esc(title)}</div>
              <div class="ap-time" id="ap-time-${i}">0:00 / ${dur}</div>
            </div>
            <a class="ap-download" href="${esc(audioUrl)}" download="${esc(title)}.mp3" title="다운로드">⬇</a>
          </div>
          <div class="ap-prog-wrap" data-idx="${i}">
            <div class="ap-prog-track">
              <div class="ap-prog-fill" id="ap-prog-${i}"></div>
            </div>
          </div>
          <div class="ap-viz" id="ap-viz-${i}">
            ${Array(28).fill(0).map(()=>'<div class="ap-vbar"></div>').join('')}
          </div>
        </div>
      </div>`;
    container.appendChild(card);
  });

  // 이벤트 바인딩
  container.querySelectorAll('.ap-play-btn').forEach(btn => {
    btn.addEventListener('click', () => togglePlay(btn));
  });
  container.querySelectorAll('.ap-prog-wrap').forEach(wrap => {
    wrap.addEventListener('click', e => seekAudio(e, wrap));
  });
}

/* ═══ AUDIO PLAYER ═══ */
function togglePlay(btn) {
  const idx = +btn.dataset.idx;
  const url = btn.dataset.url;
  if (!url) { toast('오디오 URL이 없어요', 'err'); return; }

  // 같은 버튼 → 토글
  if (activeAudio && activeAudio._idx === idx) {
    if (activeAudio.paused) { activeAudio.play(); btn.textContent = '⏸'; startViz(idx); }
    else { activeAudio.pause(); btn.textContent = '▶'; stopViz(idx); }
    return;
  }

  // 다른 오디오 정지
  if (activeAudio) {
    activeAudio.pause();
    stopViz(activeAudio._idx);
    const oldBtn = document.querySelector(`.ap-play-btn[data-idx="${activeAudio._idx}"]`);
    if (oldBtn) oldBtn.textContent = '▶';
  }

  const audio = new Audio(url);
  audio._idx = idx;
  activeAudio = audio;

  audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    const fill = document.getElementById(`ap-prog-${idx}`);
    if (fill) fill.style.width = pct + '%';
    const timeEl = document.getElementById(`ap-time-${idx}`);
    if (timeEl) timeEl.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration||0)}`;
  });
  audio.addEventListener('ended', () => {
    btn.textContent = '▶';
    stopViz(idx);
    const fill = document.getElementById(`ap-prog-${idx}`);
    if (fill) fill.style.width = '0%';
  });
  audio.addEventListener('error', () => toast('오디오 재생 오류', 'err'));

  audio.play().then(() => {
    btn.textContent = '⏸';
    startViz(idx);
  }).catch(e => toast('재생 실패: ' + e.message, 'err'));
}

function seekAudio(e, wrap) {
  if (!activeAudio || activeAudio._idx !== +wrap.dataset.idx) return;
  const rect = wrap.querySelector('.ap-prog-track').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  activeAudio.currentTime = activeAudio.duration * pct;
}

function startViz(idx) {
  clearInterval(activeVizTimer);
  const bars = document.querySelectorAll(`#ap-viz-${idx} .ap-vbar`);
  if (!bars.length) return;
  let s = 0;
  activeVizTimer = setInterval(() => {
    bars.forEach((b, i) => {
      b.style.height = Math.max(2, Math.floor(Math.random()*18)) + 'px';
      b.classList.toggle('on', i % 7 === s % 7);
    });
    s++;
  }, 85);
}
function stopViz(idx) {
  clearInterval(activeVizTimer);
  document.querySelectorAll(`#ap-viz-${idx} .ap-vbar`).forEach(b => {
    b.style.height = '3px'; b.classList.remove('on');
  });
}

function formatTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec/60);
  const s = Math.floor(sec%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

/* ═══ HISTORY ═══ */
function renderHistory() {
  if (!history.length) { $('history-section').style.display = 'none'; return; }
  $('history-section').style.display = 'block';
  const grid = $('history-grid');
  grid.innerHTML = history.slice(0,8).map(h => `
    <div class="hist-card" onclick="playFromHistory('${h.audio_url}','${esc(h.title)}')">
      <div class="hist-thumb">
        ${h.image_url ? `<img src="${h.image_url}" alt="">` : '🎵'}
      </div>
      <div class="hist-info">
        <div class="hist-title">${esc(h.title)}</div>
        <div class="hist-sub">${h.tags?.split(',')[0]?.trim() || ''}</div>
      </div>
    </div>`).join('');
}

function playFromHistory(url, title) {
  if (!url) return;
  if (activeAudio) { activeAudio.pause(); stopViz(activeAudio._idx); }
  const audio = new Audio(url);
  audio._idx = 99;
  activeAudio = audio;
  audio.play().catch(e => toast('재생 실패: ' + e.message, 'err'));
  toast(`▶ ${title}`, '', 2000);
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══ INIT ═══ */
renderPresets();
renderHistory();
</script>
