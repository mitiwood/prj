<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ddd6fe;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4c1d95" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 배경 원형 글로우 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="60"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="40"/>
  <!-- 메인 음표 — 미니멀 8분 음표 -->
  <g filter="url(#shadow)">
    <!-- 음표 머리 -->
    <ellipse cx="220" cy="330" rx="58" ry="44" fill="url(#glow)" transform="rotate(-25,220,330)"/>
    <!-- 음표 기둥 -->
    <rect x="258" y="120" width="18" height="220" rx="9" fill="url(#glow)"/>
    <!-- 음표 깃발 (플래그) — 우아한 곡선 -->
    <path d="M276 120 C 320 130, 340 170, 310 210 C 335 175, 330 140, 276 145" fill="url(#glow)"/>
  </g>
  <!-- AI 스파크 별 -->
  <g filter="url(#glow-f)">
    <path d="M380 130 L386 148 L404 148 L390 158 L395 176 L380 166 L365 176 L370 158 L356 148 L374 148 Z" fill="#fbbf24"/>
    <path d="M350 200 L353 209 L362 209 L355 214 L357 223 L350 218 L343 223 L345 214 L338 209 L347 209 Z" fill="#fbbf24" opacity="0.7" transform="scale(0.7) translate(155,100)"/>
    <circle cx="410" cy="170" r="4" fill="#fbbf24" opacity="0.5"/>
  </g>
</svg>
