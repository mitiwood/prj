<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e9d5ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 음표 기둥 -->
  <rect x="200" y="100" width="22" height="260" rx="11" fill="url(#note)"/>
  <rect x="310" y="70" width="22" height="250" rx="11" fill="url(#note)"/>
  <!-- 음표 머리 (타원) -->
  <ellipse cx="178" cy="360" rx="52" ry="38" fill="url(#note)" transform="rotate(-20,178,360)"/>
  <ellipse cx="288" cy="320" rx="52" ry="38" fill="url(#note)" transform="rotate(-20,288,320)"/>
  <!-- 음표 연결 빔 -->
  <rect x="211" y="88" width="121" height="20" rx="6" fill="url(#note)" transform="rotate(-8,270,98)"/>
  <!-- AI 스파크 -->
  <circle cx="380" cy="140" r="8" fill="#fbbf24"/>
  <circle cx="400" cy="180" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="360" cy="170" r="4" fill="#fbbf24" opacity="0.5"/>
</svg>
