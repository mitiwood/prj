name: Deploy → Notify + Flutter Build

on:
  push:
    branches: [main]

jobs:
  notify-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Wait for Vercel deploy
        run: sleep 30

      - name: Check site health
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://ai-music-studio-bice.vercel.app")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Get commit info
        id: info
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "msg<<EOFMSG" >> "$GITHUB_OUTPUT"
          echo "$MSG" >> "$GITHUB_OUTPUT"
          echo "EOFMSG" >> "$GITHUB_OUTPUT"
          echo "hash=$(git log -1 --pretty=%h)" >> "$GITHUB_OUTPUT"
          echo "author=$(git log -1 --pretty=%an)" >> "$GITHUB_OUTPUT"
          FILES=$(git diff --name-only HEAD~1 HEAD | head -10 | tr '\n' ', ' | sed 's/,$//')
          echo "files<<EOFFILES" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOFFILES" >> "$GITHUB_OUTPUT"
          COUNT=$(git diff --name-only HEAD~1 HEAD | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Send Telegram + Kakao notification
        continue-on-error: true
        env:
          COMMIT_MSG: ${{ steps.info.outputs.msg }}
          COMMIT_HASH: ${{ steps.info.outputs.hash }}
          COMMIT_AUTHOR: ${{ steps.info.outputs.author }}
          CHANGED_FILES: ${{ steps.info.outputs.files }}
          FILE_COUNT: ${{ steps.info.outputs.count }}
          HTTP_STATUS: ${{ steps.health.outputs.status }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_text = os.environ.get('COMMIT_MSG', '')
          h = os.environ.get('COMMIT_HASH', '')
          author = os.environ.get('COMMIT_AUTHOR', '')
          files = os.environ.get('CHANGED_FILES', '')
          count = os.environ.get('FILE_COUNT', '0')
          status = os.environ.get('HTTP_STATUS', '?')

          health = '\u2705 사이트 정상' if status == '200' else f'\u26a0 응답: {status}'

          # 이벤트 기반 발송 (HTML 포맷 + 인라인 키보드 자동)
          tg_payload = {
            'event': 'deploy',
            'data': {
              'commit': f'{h} {msg_text}',
              'author': author,
              'files': files,
              'count': count,
              'health': status,
            },
          }

          # Telegram (이벤트 방식)
          try:
            tg = json.dumps(tg_payload, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            ))
          except Exception as e:
            print(f'TG error: {e}')

          # 카카오용 plain text
          text = (
            f'\U0001f680 배포 완료\n\n'
            f'{h} {msg_text}\n'
            f'{author} | {count}개 파일\n'
            f'{files}\n\n'
            f'{health}'
          )

          # Kakao
          try:
            kk = json.dumps({'text': text}).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/kakao-notify', data=kk,
              headers={'Content-Type': 'application/json; charset=utf-8'}
            ))
          except Exception as e:
            print(f'KK error: {e}')
          PYEOF

      # Flutter 빌드 트리거
      - name: Trigger Flutter build
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/mitiwood/ai-music-studio-flutter/actions/workflows/build.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Flutter build triggered"
