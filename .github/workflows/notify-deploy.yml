name: Notify Deploy to Telegram

on:
  push:
    branches: [main]

jobs:
  notify-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Wait for Vercel deploy
        run: sleep 30

      - name: Check Vercel site is live
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://ai-music-studio-bice.vercel.app")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Get commit info
        id: info
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "msg<<EOFMSG" >> "$GITHUB_OUTPUT"
          echo "$MSG" >> "$GITHUB_OUTPUT"
          echo "EOFMSG" >> "$GITHUB_OUTPUT"
          echo "hash=$(git log -1 --pretty=%h)" >> "$GITHUB_OUTPUT"
          echo "author=$(git log -1 --pretty=%an)" >> "$GITHUB_OUTPUT"
          FILES=$(git diff --name-only HEAD~1 HEAD | head -10 | tr '\n' ', ' | sed 's/,$//')
          echo "files<<EOFFILES" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOFFILES" >> "$GITHUB_OUTPUT"
          COUNT=$(git diff --name-only HEAD~1 HEAD | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ steps.info.outputs.msg }}
          COMMIT_HASH: ${{ steps.info.outputs.hash }}
          COMMIT_AUTHOR: ${{ steps.info.outputs.author }}
          CHANGED_FILES: ${{ steps.info.outputs.files }}
          FILE_COUNT: ${{ steps.info.outputs.count }}
          HTTP_STATUS: ${{ steps.health.outputs.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html

          token = os.environ['TG_TOKEN']
          chat = os.environ['TG_CHAT']
          msg = html.escape(os.environ.get('COMMIT_MSG', ''))
          h = os.environ.get('COMMIT_HASH', '')
          author = os.environ.get('COMMIT_AUTHOR', '')
          files = html.escape(os.environ.get('CHANGED_FILES', ''))
          count = os.environ.get('FILE_COUNT', '0')
          status = os.environ.get('HTTP_STATUS', '?')
          run_url = os.environ.get('RUN_URL', '')

          health = '✅ 사이트 정상 (200 OK)' if status == '200' else f'⚠️ 응답 코드: {status}'

          text = (
            f'<b>🚀 Vercel 배포 완료</b>\n\n'
            f'<b>커밋:</b> <code>{h}</code> {msg}\n'
            f'<b>작성자:</b> {author}\n'
            f'<b>변경 파일:</b> {count}개\n'
            f'<code>{files}</code>\n\n'
            f'{health}\n'
            f'🔗 <a href="https://ai-music-studio-bice.vercel.app">사이트 확인</a>'
            f' · <a href="{run_url}">Actions 로그</a>'
          )

          payload = json.dumps({
            'chat_id': chat,
            'text': text,
            'parse_mode': 'HTML',
            'disable_web_page_preview': True
          }, ensure_ascii=False).encode('utf-8')

          req = urllib.request.Request(
            f'https://api.telegram.org/bot{token}/sendMessage',
            data=payload,
            headers={'Content-Type': 'application/json; charset=utf-8'}
          )
          resp = json.loads(urllib.request.urlopen(req).read().decode('utf-8'))
          print(f"Sent message_id: {resp['result']['message_id']}")
          PYEOF
