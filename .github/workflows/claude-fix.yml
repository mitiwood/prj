name: Claude Code Auto-Fix

on:
  issues:
    types: [opened]

jobs:
  claude-fix:
    if: contains(github.event.issue.labels.*.name, 'claude-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Notify start
        id: tg_start
        continue-on-error: true
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')

          msg = f'\U0001f916 Claude Code 작업 시작\n\nIssue #{num}: {title}\n\n\u23f3 코드 체크아웃 중...'

          # Telegram via site API
          try:
            tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            resp = json.loads(urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            )).read().decode('utf-8'))
            msg_id = resp.get('message_id', '')
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'msg_id={msg_id}\n')
          except Exception as e:
            print(f'TG error: {e}')

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update progress
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')

          msg = f'\U0001f916 Claude Code 진행 중\n\nIssue #{num}: {title}\n\n\u2705 체크아웃 완료\n\u23f3 코드 분석 및 수정 중... (최대 30분)'

          # Telegram edit via site API
          if msg_id:
            try:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except Exception as e:
              print(f'TG edit error: {e}')

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF

      - uses: anthropics/claude-code-action@beta
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            다음 수정 요청을 처리해주세요:

            ${{ github.event.issue.body }}

            규칙:
            - index.html 파일만 수정하세요. 다른 파일(api/*.js, admin/, .github/)은 절대 수정/삭제하지 마세요
            - 기존 기능, 함수, CSS를 절대 제거하지 마세요. 추가/수정만 하세요
            - 요청받은 부분만 최소한으로 수정하세요. 관련 없는 코드를 건드리지 마세요
            - git diff로 변경사항을 확인하고, 삭제된 줄이 50줄 이상이면 수정을 중단하세요
            - 수정 완료 후 반드시 아래 순서로 PR을 생성하세요:
              1. git checkout -b fix/issue-${{ github.event.issue.number }}
              2. git add -A
              3. git commit -m "fix: ${{ github.event.issue.title }}"
              4. git push origin fix/issue-${{ github.event.issue.number }}
              5. GH_TOKEN=$GITHUB_TOKEN gh pr create --title "fix: ${{ github.event.issue.title }}" --body "Closes #${{ github.event.issue.number }}" --base main
            - PR 생성이 실패하면 에러 메시지를 출력하세요
            - 변경 내용을 한국어로 요약해주세요
          allowed_tools: "Edit,Read,Glob,Grep,Write,Bash(git:*),Bash(gh:*),Bash(GH_TOKEN:*)"
          timeout_minutes: 30

      - name: Find PR number
        if: success()
        id: find_pr
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          PR_NUM=$(gh pr list --state open --json number,headRefName \
            --jq ".[] | select(.headRefName | test(\"issue-${ISSUE_NUM}\")) | .number" 2>/dev/null | head -1)
          echo "pr_num=${PR_NUM:-없음}" >> "$GITHUB_OUTPUT"
          echo "Found PR: ${PR_NUM:-none}"

      - name: Notify success
        if: success()
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          PR_NUM: ${{ steps.find_pr.outputs.pr_num }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')
          pr_num = os.environ.get('PR_NUM', '').strip()
          run_url = os.environ.get('RUN_URL', '')

          has_pr = pr_num and pr_num != '없음'
          pr_line = f'\U0001f500 PR #{pr_num} 생성됨\n\n머지하려면: 머지' if has_pr else '\u26a0 PR 미생성 (변경사항 없음)'

          msg = f'\u2705 Claude Code 작업 완료!\n\nIssue #{num}: {title}\n\n{pr_line}\n\n{run_url}'

          # Telegram edit or send via site API
          try:
            if msg_id:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            else:
              tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            ))
          except Exception as e:
            print(f'TG error: {e}')
            # fallback: new message
            try:
              tg2 = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg2,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except: pass

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except Exception as e:
            print(f'Kakao error: {e}')
          PYEOF

      - name: Notify failure
        if: failure()
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')
          run_url = os.environ.get('RUN_URL', '')

          msg = f'\u274c Claude Code 작업 실패\n\nIssue #{num}: {title}\n\n로그: {run_url}'

          try:
            if msg_id:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            else:
              tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            ))
          except:
            try:
              tg2 = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg2,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except: pass

          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF
