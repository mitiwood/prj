name: Claude Code Auto-Fix

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: claude-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude-fix:
    if: contains(github.event.issue.labels.*.name, 'claude-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      # ── 0. 시크릿 사전 검증 ──
      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          MISSING=""
          if [ -z "$ANTHROPIC_API_KEY" ]; then MISSING="$MISSING ANTHROPIC_API_KEY"; fi
          if [ -z "$PAT_TOKEN" ]; then MISSING="$MISSING PAT_TOKEN"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present"
          # API 키 형식 기본 검증
          if [[ ! "$ANTHROPIC_API_KEY" == sk-ant-* ]]; then
            echo "::warning::ANTHROPIC_API_KEY doesn't start with sk-ant- (may be invalid)"
          fi

      # ── 1. 시작 알림 ──
      - name: Notify start
        id: tg_start
        continue-on-error: true
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html as html_mod
          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', '')
          title = html_mod.escape(os.environ.get('ISSUE_TITLE', ''))
          num = os.environ.get('ISSUE_NUM', '?')
          msg = f'\U0001f916 <b>Claude Code 작업 시작</b>\n\n\U0001f4cc Issue #{num}: {title}\n\n\u23f3 코드 분석 및 수정 중...'
          kb = {'inline_keyboard': [[{'text': '\U0001f517 이슈', 'url': f'https://github.com/mitiwood/ai-music-studio/issues/{num}'}]]}
          try:
            tg = json.dumps({'text': msg, 'parse_mode': 'HTML', 'reply_markup': kb}, ensure_ascii=False).encode('utf-8')
            resp = json.loads(urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            )).read().decode('utf-8'))
            mid = resp.get('message_id', '')
            print(f'TG start OK, message_id={mid}')
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"msg_id={mid}\n")
          except Exception as e:
            print(f'TG start failed: {e}')
          PYEOF

      # ── 2. 체크아웃 + 설정 ──
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. 화면 태그 파싱 + 프롬프트 생성 ──
      - name: Parse screen tag and build prompt
        id: prompt
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import os, re, json

          body = os.environ.get('ISSUE_BODY', '')
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '0')

          # [화면] 태그 파싱 — 제목이나 본문에서 추출
          tag_match = re.search(r'\[([^\]]+)\]', title) or re.search(r'\[([^\]]+)\]', body)
          screen = tag_match.group(1).strip() if tag_match else ''

          # 화면별 파일/줄 범위 매핑 (토큰 절약용)
          SCREEN_MAP = {
              # HTML 뷰 영역
              '생성':     {'files': ['index.html:3969-4822', 'js/create-enhance.js'], 'desc': 'CREATE VIEW (음악 생성 폼)'},
              '만들기':   {'files': ['index.html:3969-4822', 'js/create-enhance.js'], 'desc': 'CREATE VIEW'},
              'create':   {'files': ['index.html:3969-4822', 'js/create-enhance.js'], 'desc': 'CREATE VIEW'},
              '히스토리': {'files': ['index.html:4823-4867'], 'desc': 'HISTORY VIEW (라이브러리)'},
              '라이브러리':{'files': ['index.html:4823-4867'], 'desc': 'HISTORY VIEW'},
              'history':  {'files': ['index.html:4823-4867'], 'desc': 'HISTORY VIEW'},
              '커뮤니티': {'files': ['index.html:4868-4930'], 'desc': 'COMMUNITY VIEW'},
              'community':{'files': ['index.html:4868-4930'], 'desc': 'COMMUNITY VIEW'},
              '설정':     {'files': ['index.html:4931-5368'], 'desc': 'SETTINGS VIEW'},
              'settings': {'files': ['index.html:4931-5368'], 'desc': 'SETTINGS VIEW'},
              '플레이어': {'files': ['index.html:5416-5760'], 'desc': '미니플레이어 + 풀플레이어'},
              'player':   {'files': ['index.html:5416-5760'], 'desc': '미니/풀 플레이어'},
              '플레이어편집':{'files': ['index.html:5761-5830'], 'desc': '풀플레이어 편집 바텀시트'},
              '공유':     {'files': ['index.html:5948-6053'], 'desc': '공유 시트 + DM'},
              'share':    {'files': ['index.html:5948-6053'], 'desc': '공유 시트'},
              '로그인':   {'files': ['index.html:6479-6552'], 'desc': '로그인 모달'},
              'login':    {'files': ['index.html:6479-6552'], 'desc': '로그인 모달'},
              '리믹스':   {'files': ['index.html:5894-6420'], 'desc': '리믹스/도구 바텀시트들'},
              'remix':    {'files': ['index.html:5894-6420'], 'desc': '리믹스 바텀시트'},
              '노래방':   {'files': ['index.html:6418-6478', 'js/vocal-removal.js'], 'desc': '노래방 + 보컬 제거'},
              '보컬':     {'files': ['index.html:6054-6112', 'js/vocal-removal.js'], 'desc': '보컬 변경/제거'},
              '공지':     {'files': ['index.html:6455-6478'], 'desc': '인앱 공지 팝업'},
              '알림':     {'files': ['index.html:19545-19576'], 'desc': '알림 인박스'},
              '프로필':   {'files': ['index.html:5381-5414', 'index.html:19403-19476'], 'desc': '프로필 뷰 + 시트'},
              'profile':  {'files': ['index.html:5381-5414', 'index.html:19403-19476'], 'desc': '프로필'},
              '채팅':     {'files': ['index.html:5499-5546'], 'desc': 'AI 채팅'},
              'chat':     {'files': ['index.html:5499-5546'], 'desc': 'AI 채팅'},
              '플랜':     {'files': ['index.html:5122-5240', 'index.html:19634-21488'], 'desc': '구독 플랜'},
              'plan':     {'files': ['index.html:5122-5240', 'index.html:19634-21488'], 'desc': '구독 플랜'},
              # CSS
              'css':      {'files': ['index.html:126-3953'], 'desc': 'CSS 스타일'},
              '스타일':   {'files': ['index.html:126-3953'], 'desc': 'CSS 스타일'},
              'style':    {'files': ['index.html:126-3953'], 'desc': 'CSS 스타일'},
              # JS 메인
              'js':       {'files': ['index.html:6553-19401'], 'desc': '메인 JS 로직'},
              # API
              'api':      {'files': ['api/'], 'desc': 'API 엔드포인트'},
              '봇':       {'files': ['api/tg-webhook.js', 'api/kakao-webhook.js'], 'desc': '텔레그램/카카오 봇'},
              'bot':      {'files': ['api/tg-webhook.js', 'api/kakao-webhook.js'], 'desc': '봇'},
          }

          screen_lower = screen.lower() if screen else ''
          mapping = SCREEN_MAP.get(screen_lower, SCREEN_MAP.get(screen, None))

          # 프롬프트 생성
          lines = []
          lines.append(f'다음 수정 요청을 처리해주세요:\n')
          lines.append(body)

          if mapping:
              lines.append(f'\n🎯 수정 대상 화면: {mapping["desc"]}')
              lines.append('아래 파일/범위만 먼저 읽고, 필요할 때만 다른 파일을 참조하세요:')
              for f in mapping['files']:
                  if ':' in f and not f.startswith('api/'):
                      fname, lrange = f.split(':', 1)
                      start, end = lrange.split('-')
                      lines.append(f'  - {fname} (줄 {start}~{end})')
                  else:
                      lines.append(f'  - {f}')
              lines.append('')
              lines.append('⚠️ 토큰 절약: 전체 index.html을 읽지 마세요. 위 범위만 Read하세요.')
          else:
              lines.append('\n대상 파일을 스스로 파악하되, index.html은 24000줄이므로 필요한 부분만 읽으세요.')
              lines.append('Grep/Glob으로 위치를 먼저 찾고, 해당 범위만 Read하세요.')

          lines.append(f'\n규칙:')
          lines.append('- CLAUDE.md 파일의 프로젝트 규칙을 따르세요')
          lines.append('- 기존 기능, 함수, CSS를 절대 제거하지 마세요')
          lines.append('- node_modules/, .env 파일은 수정하지 마세요')
          lines.append('- 수정 완료 후 git add + git commit을 직접 실행하세요')
          lines.append(f'- 커밋 메시지: "fix: [#{num}] <간결한 설명>"')

          prompt = '\n'.join(lines)
          with open('/tmp/claude-prompt.txt', 'w') as f:
              f.write(prompt)

          print(f'Screen tag: "{screen}" → {"mapped to " + mapping["desc"] if mapping else "no mapping (full scan)"}')
          print(f'Prompt length: {len(prompt)} chars')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"screen={screen}\n")
          PYEOF

      # ── 4. Claude Code 실행 ──
      - name: Run Claude Code
        id: claude
        timeout-minutes: 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail

          echo "=== Installing Claude Code CLI ==="
          npm install -g @anthropic-ai/claude-code
          echo "Claude Code version: $(claude --version 2>/dev/null || echo 'unknown')"

          echo "=== Prompt ==="
          cat /tmp/claude-prompt.txt
          echo ""
          echo "=== Running Claude Code ==="
          cat /tmp/claude-prompt.txt | claude --print \
            --allowedTools "Edit,Read,Glob,Grep,Write,Bash" \
            2>&1 | tee /tmp/claude-output.txt

          EXIT_CODE=${PIPESTATUS[1]}
          echo "claude_exit=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Claude Code exited with code $EXIT_CODE"
            echo "=== Last 50 lines of output ==="
            tail -50 /tmp/claude-output.txt
            exit 1
          fi

          echo "=== Claude Code completed successfully ==="

      # ── 4. 변경사항 확인 + 푸시 ──
      - name: Push changes
        id: push
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          echo "=== Git status ==="
          git status
          echo ""

          # Claude가 이미 커밋했는지 확인
          LAST_MSG=$(git log --oneline -1 --format="%s")
          echo "Last commit: $LAST_MSG"

          HAS_COMMITTED=$(echo "$LAST_MSG" | grep -c "fix:" || true)
          HAS_CHANGES=$(git diff --name-only)
          HAS_STAGED=$(git diff --cached --name-only)
          HAS_UNTRACKED=$(git ls-files --others --exclude-standard)

          echo "HAS_COMMITTED=$HAS_COMMITTED"
          echo "HAS_CHANGES=$HAS_CHANGES"
          echo "HAS_STAGED=$HAS_STAGED"
          echo "HAS_UNTRACKED=$HAS_UNTRACKED"

          # Claude가 커밋 안 했으면 수동 커밋
          if [ "$HAS_COMMITTED" = "0" ] && [ -n "$HAS_CHANGES$HAS_STAGED$HAS_UNTRACKED" ]; then
            echo "Claude didn't commit — committing now"
            git add -A
            git commit -m "fix: [#${ISSUE_NUM}] ${ISSUE_TITLE}" \
              --author="claude-bot <claude-bot@users.noreply.github.com>" || true
          fi

          # origin/main 대비 변경사항 확인
          DIFF=$(git diff origin/main --name-only)
          if [ -z "$DIFF" ]; then
            echo "status=no_changes" >> "$GITHUB_OUTPUT"
            echo "::warning::No changes to push — Claude Code didn't modify any files"
            echo "changed_files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "=== Changed files ==="
          echo "$DIFF"
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "Pushing to main..."
          git push origin HEAD:main
          echo "status=merged" >> "$GITHUB_OUTPUT"
          echo "✅ Push successful"

      # ── 5. 이슈 닫기 ──
      - name: Close issue
        if: steps.push.outputs.status == 'merged'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUM}" \
            -d '{"state":"closed","state_reason":"completed"}'

      # ── 6. 결과 알림 (성공/실패 모두) ──
      - name: Notify result
        if: always()
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          PUSH_STATUS: ${{ steps.push.outputs.status }}
          CHANGED_FILES: ${{ steps.push.outputs.changed_files }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          CLAUDE_EXIT: ${{ steps.claude.outputs.claude_exit }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html as html_mod

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', '')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = html_mod.escape(os.environ.get('ISSUE_TITLE', ''))
          num = os.environ.get('ISSUE_NUM', '?')
          push_status = os.environ.get('PUSH_STATUS', '').strip()
          claude_out = os.environ.get('CLAUDE_OUTCOME', '?')
          claude_exit = os.environ.get('CLAUDE_EXIT', '?')
          run_url = os.environ.get('RUN_URL', '')
          changed = os.environ.get('CHANGED_FILES', '').strip()

          # 상태 판단
          if push_status == 'merged':
            icon = '\u2705'
            files_list = '\n'.join(f'  \u2022 {f}' for f in changed.split('\n') if f.strip()) if changed else ''
            status_line = '\u2705 main 푸시 완료! Vercel 배포 시작됨'
            if files_list:
              status_line += f'\n\n\U0001f4c1 수정된 파일:\n{files_list}'
          elif push_status == 'no_changes':
            icon = '\u26a0\ufe0f'
            status_line = '\u26a0\ufe0f 변경사항 없음 — Claude가 파일을 수정하지 않았습니다'
          elif claude_out == 'failure':
            icon = '\u274c'
            status_line = f'\u274c Claude Code 실행 실패 (exit: {claude_exit})\n\n로그를 확인해주세요'
          else:
            icon = '\u26a0\ufe0f'
            status_line = f'\u26a0\ufe0f 예상치 못한 상태 (Claude: {claude_out}, Push: {push_status or "skipped"})'

          msg = f'{icon} <b>Claude Code 작업 완료</b>\n\n\U0001f4cc Issue #{num}: {title}\n\n{status_line}'
          kb = {'inline_keyboard': [
            [{'text': '\U0001f310 사이트', 'url': site}, {'text': '\U0001f4cb 로그', 'url': run_url}],
            [{'text': '\U0001f517 이슈', 'url': f'https://github.com/mitiwood/ai-music-studio/issues/{num}'}],
          ]}

          def tg_send(payload):
            data = json.dumps(payload, ensure_ascii=False).encode('utf-8')
            req = urllib.request.Request(
              f'{site}/api/telegram', data=data,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            )
            return json.loads(urllib.request.urlopen(req).read().decode('utf-8'))

          # 텔레그램 알림: edit 시도 → 실패 시 새 메시지
          sent = False
          if msg_id:
            try:
              tg_send({'text': msg, 'parse_mode': 'HTML', 'reply_markup': kb, 'action': 'edit', 'message_id': int(msg_id)})
              sent = True
              print(f'TG edit OK (msg_id={msg_id})')
            except Exception as e:
              print(f'TG edit failed: {e}')

          if not sent:
            try:
              tg_send({'text': msg, 'parse_mode': 'HTML', 'reply_markup': kb})
              print('TG new message sent')
            except Exception as e:
              print(f'TG send failed: {e}')

          # 카카오 알림
          try:
            # HTML 태그 제거
            import re
            plain = re.sub(r'<[^>]+>', '', msg)
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify',
              data=json.dumps({'text': plain[:300]}, ensure_ascii=False).encode('utf-8'),
              headers={'Content-Type': 'application/json; charset=utf-8'}))
            print('Kakao notify sent')
          except Exception as e:
            print(f'Kakao notify failed: {e}')
          PYEOF
