name: Claude Code Auto-Fix

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

concurrency:
  group: claude-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude-fix:
    if: |
      contains(github.event.issue.labels.*.name, 'claude-fix') &&
      (github.event_name == 'issues' ||
       (github.event_name == 'issue_comment' && !contains(github.event.comment.user.login, 'claude-bot') && !contains(github.event.comment.user.login, 'github-actions')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      # ── 0. 시크릿 사전 검증 ──
      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          MISSING=""
          if [ -z "$ANTHROPIC_API_KEY" ]; then MISSING="$MISSING ANTHROPIC_API_KEY"; fi
          if [ -z "$PAT_TOKEN" ]; then MISSING="$MISSING PAT_TOKEN"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present"
          # API 키 형식 기본 검증
          if [[ ! "$ANTHROPIC_API_KEY" == sk-ant-* ]]; then
            echo "::warning::ANTHROPIC_API_KEY doesn't start with sk-ant- (may be invalid)"
          fi

      # ── 1. 시작 알림 ──
      - name: Notify start
        id: tg_start
        continue-on-error: true
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html as html_mod
          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', '')
          title = html_mod.escape(os.environ.get('ISSUE_TITLE', ''))
          num = os.environ.get('ISSUE_NUM', '?')
          msg = f'\U0001f916 <b>Claude Code 작업 시작</b>\n\n\U0001f4cc Issue #{num}: {title}\n\n\u23f3 코드 분석 및 수정 중...'
          kb = {'inline_keyboard': [[{'text': '\U0001f517 이슈', 'url': f'https://github.com/mitiwood/ai-music-studio/issues/{num}'}]]}
          try:
            tg = json.dumps({'text': msg, 'parse_mode': 'HTML', 'reply_markup': kb}, ensure_ascii=False).encode('utf-8')
            resp = json.loads(urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            )).read().decode('utf-8'))
            mid = resp.get('message_id', '')
            print(f'TG start OK, message_id={mid}')
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"msg_id={mid}\n")
          except Exception as e:
            print(f'TG start failed: {e}')
          PYEOF

      # ── 2. 체크아웃 + 설정 ──
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. 화면 태그 파싱 + 프롬프트 생성 ──
      - name: Parse screen tag and build prompt
        id: prompt
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: mitiwood/ai-music-studio
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request

          body = os.environ.get('ISSUE_BODY', '')
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '0')
          event_name = os.environ.get('EVENT_NAME', 'issues')
          comment_body = os.environ.get('COMMENT_BODY', '')
          gh_token = os.environ.get('GH_TOKEN', '')
          gh_repo = os.environ.get('GH_REPO', '')

          # issue_comment 이벤트 시 전체 스레드 가져오기
          thread_context = ''
          if event_name == 'issue_comment' and gh_token and gh_repo:
              try:
                  req = urllib.request.Request(
                      f'https://api.github.com/repos/{gh_repo}/issues/{num}/comments?per_page=20',
                      headers={'Authorization': f'Bearer {gh_token}', 'Accept': 'application/vnd.github+json'}
                  )
                  comments = json.loads(urllib.request.urlopen(req).read().decode('utf-8'))
                  user_comments = [c for c in comments if 'bot' not in (c.get('user',{}).get('login','').lower())]
                  if user_comments:
                      thread_context = '\n\n## 이전 대화 맥락\n\n'
                      for c in user_comments:
                          thread_context += f"### 코멘트 ({c['created_at'][:10]})\n{c['body']}\n\n"
                      print(f'Loaded {len(user_comments)} user comments for context')
              except Exception as e:
                  print(f'Failed to fetch comments: {e}')

          # [화면] 태그 파싱 — 제목이나 본문에서 추출
          tag_match = re.search(r'\[([^\]]+)\]', title) or re.search(r'\[([^\]]+)\]', body)
