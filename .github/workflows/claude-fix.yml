name: Claude Code Auto-Fix

on:
  issues:
    types: [opened]

jobs:
  claude-fix:
    if: contains(github.event.issue.labels.*.name, 'claude-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Notify start
        id: tg_start
        continue-on-error: true
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')

          msg = f'\U0001f916 Claude Code 작업 시작\n\nIssue #{num}: {title}\n\n\u23f3 코드 체크아웃 중...'

          # Telegram via site API
          try:
            tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            resp = json.loads(urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            )).read().decode('utf-8'))
            msg_id = resp.get('message_id', '')
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'msg_id={msg_id}\n')
          except Exception as e:
            print(f'TG error: {e}')

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update progress
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')

          msg = f'\U0001f916 Claude Code 진행 중\n\nIssue #{num}: {title}\n\n\u2705 체크아웃 완료\n\u23f3 코드 분석 및 수정 중... (최대 30분)'

          # Telegram edit via site API
          if msg_id:
            try:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except Exception as e:
              print(f'TG edit error: {e}')

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF

      - uses: anthropics/claude-code-action@beta
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          direct_prompt: |
            다음 수정 요청을 처리해주세요:

            ${{ github.event.issue.body }}

            규칙:
            - index.html 파일만 수정하세요. 다른 파일(api/*.js, admin/, .github/)은 절대 수정/삭제하지 마세요
            - 기존 기능, 함수, CSS를 절대 제거하지 마세요. 추가/수정만 하세요
            - 요청받은 부분만 최소한으로 수정하세요. 관련 없는 코드를 건드리지 마세요
            - git diff로 변경사항을 확인하고, 삭제된 줄이 50줄 이상이면 수정을 중단하세요
            - 수정이 완료되면 변경 내용을 한국어로 요약해주세요
            - 브랜치나 PR을 직접 생성하지 마세요. 시스템이 자동으로 처리합니다.
          allowed_tools: "Edit,Read,Glob,Grep,Write"
          timeout_minutes: 30

      - name: Create PR and auto-merge
        if: success()
        id: create_merge
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # claude-code-action creates branch as claude/issue-{num}-{date}
          # Find the branch dynamically using grep (glob patterns unreliable)
          BRANCH=$(git ls-remote --heads origin | grep "refs/heads/claude/issue-${ISSUE_NUM}-" | awk '{print $2}' | sed 's|refs/heads/||' | sort | tail -1)

          # Fallback: also check fix/issue-{num}
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git ls-remote --heads origin | grep "refs/heads/fix/issue-${ISSUE_NUM}$" | awk '{print $2}' | sed 's|refs/heads/||' | head -1)
          fi

          if [ -z "$BRANCH" ]; then
            echo "status=no_branch" >> "$GITHUB_OUTPUT"
            echo "No branch found for issue #${ISSUE_NUM}"
            exit 0
          fi

          echo "Found branch: $BRANCH"

          # Create PR
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "fix: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUM}" 2>&1) || true

          # If PR already exists, find it
          if echo "$PR_URL" | grep -q "already exists"; then
            PR_URL=$(gh pr list --state open --head "$BRANCH" --json url --jq '.[0].url' 2>/dev/null)
          fi

          PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$' || echo "")

          if [ -z "$PR_NUM" ]; then
            echo "status=no_pr" >> "$GITHUB_OUTPUT"
            echo "Failed to create PR"
            exit 0
          fi

          echo "pr_num=${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "Created PR #${PR_NUM}"

          # Auto-merge (squash)
          MERGE_RESULT=$(gh pr merge "$PR_NUM" --squash --delete-branch 2>&1) || true

          if echo "$MERGE_RESULT" | grep -qi "merge\|merged"; then
            echo "status=merged" >> "$GITHUB_OUTPUT"
            echo "PR #${PR_NUM} merged successfully"
          else
            # Try rebase merge as fallback (for conflict cases)
            MERGE_RESULT2=$(gh pr merge "$PR_NUM" --merge --delete-branch 2>&1) || true
            if echo "$MERGE_RESULT2" | grep -qi "merge\|merged"; then
              echo "status=merged" >> "$GITHUB_OUTPUT"
              echo "PR #${PR_NUM} merged (rebase fallback)"
            else
              echo "status=merge_failed" >> "$GITHUB_OUTPUT"
              echo "merge_error=${MERGE_RESULT}" >> "$GITHUB_OUTPUT"
              echo "Merge failed: ${MERGE_RESULT}"
            fi
          fi

      - name: Notify success
        if: success()
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          PR_NUM: ${{ steps.create_merge.outputs.pr_num }}
          MERGE_STATUS: ${{ steps.create_merge.outputs.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')
          pr_num = os.environ.get('PR_NUM', '').strip()
          status = os.environ.get('MERGE_STATUS', '').strip()
          run_url = os.environ.get('RUN_URL', '')

          if status == 'merged':
            pr_line = f'\u2705 PR #{pr_num} 생성 + 자동 머지 완료!\n\n\U0001f680 Vercel 배포 시작됨 (약 30초 후 반영)'
          elif status == 'merge_failed':
            pr_line = f'\U0001f500 PR #{pr_num} 생성됨 (자동 머지 실패)\n\n수동 머지 필요: 머지 {pr_num}'
          elif status == 'no_branch':
            pr_line = '\u26a0 변경사항 없음 (브랜치 미생성)'
          else:
            pr_line = '\u26a0 PR 미생성'

          msg = f'\u2705 Claude Code 작업 완료!\n\nIssue #{num}: {title}\n\n{pr_line}\n\n{run_url}'

          # Telegram edit or send via site API
          try:
            if msg_id:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            else:
              tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            ))
          except Exception as e:
            print(f'TG error: {e}')
            # fallback: new message
            try:
              tg2 = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg2,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except: pass

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except Exception as e:
            print(f'Kakao error: {e}')
          PYEOF

      - name: Notify failure
        if: failure()
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')
          run_url = os.environ.get('RUN_URL', '')

          msg = f'\u274c Claude Code 작업 실패\n\nIssue #{num}: {title}\n\n로그: {run_url}'

          try:
            if msg_id:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            else:
              tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            ))
          except:
            try:
              tg2 = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg2,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except: pass

          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF
