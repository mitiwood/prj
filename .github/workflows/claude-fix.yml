name: Claude Code Auto-Fix

on:
  issues:
    types: [opened]

jobs:
  claude-fix:
    if: contains(github.event.issue.labels.*.name, 'claude-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Notify start
        id: tg_start
        continue-on-error: true
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')

          msg = f'\U0001f916 Claude Code 작업 시작\n\nIssue #{num}: {title}\n\n\u23f3 코드 체크아웃 중...'

          # Telegram via site API
          try:
            tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            resp = json.loads(urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            )).read().decode('utf-8'))
            msg_id = resp.get('message_id', '')
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'msg_id={msg_id}\n')
          except Exception as e:
            print(f'TG error: {e}')

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update progress
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')

          msg = f'\U0001f916 Claude Code 진행 중\n\nIssue #{num}: {title}\n\n\u2705 체크아웃 완료\n\u23f3 코드 분석 및 수정 중... (최대 30분)'

          # Telegram edit via site API
          if msg_id:
            try:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except Exception as e:
              print(f'TG edit error: {e}')

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF

      - uses: anthropics/claude-code-action@beta
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PAT_TOKEN }}
          direct_prompt: |
            다음 수정 요청을 처리해주세요 (최고 권한 — 모든 파일 수정 가능):

            ${{ github.event.issue.body }}

            규칙:
            - 프로젝트 내 모든 파일을 수정할 수 있습니다 (index.html, api/*.js, .github/workflows/*.yml, admin/, scripts/, public/, package.json 등)
            - node_modules/, .env 파일만 수정하지 마세요
            - 기존 기능, 함수, CSS를 절대 제거하지 마세요. 추가/수정만 하세요
            - CLAUDE.md 파일을 읽고 프로젝트 규칙을 따르세요
            - 수정이 완료되면 변경 내용을 한국어로 요약해주세요

            중요 — 반드시 아래 순서대로 실행하세요:
            1. git add <수정한 파일들>
            2. git commit -m "fix: <설명>"
            3. git push origin ${{ format('claude/issue-{0}', github.event.issue.number) }}* (현재 브랜치를 반드시 push)

            push를 하지 않으면 머지가 실패합니다. 반드시 push까지 완료하세요.
          allowed_tools: "Edit,Read,Glob,Grep,Write,Bash"
          timeout_minutes: 60

      - name: Merge to main
        if: success()
        id: merge_main
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          echo "=== Looking for branch for issue #${ISSUE_NUM} ==="
          git ls-remote --heads origin | grep "issue-${ISSUE_NUM}" || echo "(no remote branches found)"

          # claude-code-action creates branch as claude/issue-{num}-{date}
          BRANCH=$(git ls-remote --heads origin | grep "refs/heads/claude/issue-${ISSUE_NUM}" | awk '{print $2}' | sed 's|refs/heads/||' | sort | tail -1)
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git ls-remote --heads origin | grep "refs/heads/fix/issue-${ISSUE_NUM}" | awk '{print $2}' | sed 's|refs/heads/||' | sort | tail -1)
          fi

          # Fallback: check if current local branch has unpushed commits
          if [ -z "$BRANCH" ]; then
            CURRENT=$(git branch --show-current)
            echo "No remote branch found. Current local branch: $CURRENT"
            if [ "$CURRENT" != "main" ] && [ -n "$CURRENT" ]; then
              # Push the current branch first, then use it
              echo "Pushing local branch $CURRENT to origin..."
              git push origin "$CURRENT" 2>/dev/null && BRANCH="$CURRENT" || true
            fi
          fi

          if [ -z "$BRANCH" ]; then
            # Last resort: check if there are uncommitted changes on current branch
            if git diff --cached --quiet && git diff --quiet; then
              echo "status=no_branch" >> "$GITHUB_OUTPUT"
              echo "No branch found and no local changes for issue #${ISSUE_NUM}"
              exit 0
            else
              echo "Local changes found but no branch — committing directly to main"
              git checkout main
              git pull origin main
              CHANGED=$(git diff --name-only)
              if [ -n "$CHANGED" ]; then
                git add -A
                git commit -m "fix: ${ISSUE_TITLE}" -m "Closes #${ISSUE_NUM}" \
                  --author="claude-bot <claude-bot@users.noreply.github.com>"
                git push origin main
                echo "status=merged" >> "$GITHUB_OUTPUT"
                echo "Direct commit to main (no branch)"
              else
                echo "status=no_branch" >> "$GITHUB_OUTPUT"
                echo "No changes to commit"
              fi
              exit 0
            fi
          fi

          echo "Found branch: $BRANCH"

          # Fetch the branch and merge directly to main (no PR needed)
          git fetch origin "$BRANCH"
          git checkout main
          git pull origin main

          # Merge with squash (combines all branch commits into one)
          if git merge --squash "origin/$BRANCH"; then
            CHANGED=$(git diff --cached --name-only)
            echo "Changed files: $CHANGED"

            if [ -z "$CHANGED" ]; then
              echo "status=no_branch" >> "$GITHUB_OUTPUT"
              echo "No actual changes to merge"
              exit 0
            fi

            git commit -m "fix: ${ISSUE_TITLE}" -m "Closes #${ISSUE_NUM}" \
              --author="claude-bot <claude-bot@users.noreply.github.com>"
            git push origin main
            echo "status=merged" >> "$GITHUB_OUTPUT"
            echo "Merged $BRANCH to main successfully"

            # Delete remote branch
            git push origin --delete "$BRANCH" 2>/dev/null || true
          else
            git merge --abort 2>/dev/null || true
            echo "status=merge_failed" >> "$GITHUB_OUTPUT"
            echo "Merge conflict — manual merge needed"
          fi

      - name: Close issue
        if: success() && steps.merge_main.outputs.status == 'merged'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUM}" \
            -d '{"state":"closed","state_reason":"completed"}'
          echo "Issue #${ISSUE_NUM} closed"

      - name: Notify success
        if: success()
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          MERGE_STATUS: ${{ steps.merge_main.outputs.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')
          status = os.environ.get('MERGE_STATUS', '').strip()
          run_url = os.environ.get('RUN_URL', '')

          if status == 'merged':
            pr_line = f'\u2705 main 자동 머지 완료!\n\n\U0001f680 Vercel 배포 시작됨 (약 30초 후 반영)\n\n\U0001f517 {site}'
          elif status == 'merge_failed':
            pr_line = '\u26a0 머지 충돌 발생 — 수동 머지 필요'
          elif status == 'no_branch':
            pr_line = '\u26a0 변경사항 없음 (브랜치 미생성)'
          else:
            pr_line = '\u26a0 머지 미완료'

          msg = f'\u2705 Claude Code 작업 완료!\n\nIssue #{num}: {title}\n\n{pr_line}\n\n{run_url}'

          # Telegram edit or send via site API
          try:
            if msg_id:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            else:
              tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            ))
          except Exception as e:
            print(f'TG error: {e}')
            # fallback: new message
            try:
              tg2 = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg2,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except: pass

          # Kakao
          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except Exception as e:
            print(f'Kakao error: {e}')
          PYEOF

      - name: Notify failure
        if: failure()
        continue-on-error: true
        env:
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = os.environ.get('ISSUE_TITLE', '')
          num = os.environ.get('ISSUE_NUM', '?')
          run_url = os.environ.get('RUN_URL', '')

          msg = f'\u274c Claude Code 작업 실패\n\nIssue #{num}: {title}\n\n로그: {run_url}'

          try:
            if msg_id:
              tg = json.dumps({'action': 'edit', 'message_id': int(msg_id), 'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            else:
              tg = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
            ))
          except:
            try:
              tg2 = json.dumps({'text': msg, 'parse_mode': ''}, ensure_ascii=False).encode('utf-8')
              urllib.request.urlopen(urllib.request.Request(
                f'{site}/api/telegram', data=tg2,
                headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'}
              ))
            except: pass

          try:
            kp = json.dumps({'text': msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
          except: pass
          PYEOF
