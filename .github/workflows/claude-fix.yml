name: Claude Code Auto-Fix

on:
  issues:
    types: [opened]

jobs:
  claude-fix:
    if: contains(github.event.issue.labels.*.name, 'claude-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Notify start
        id: tg_start
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TITLE=$(echo '${{ github.event.issue.title }}' | sed 's/[<>&]//g')
          NUM=${{ github.event.issue.number }}
          python3 -c "
          import urllib.request, json
          msg = (
            '<b>🤖 Claude Code 작업 시작</b>\n\n'
            '📋 Issue #${NUM}\n'
            '📝 ${TITLE}\n\n'
            '⏳ <i>1/4 — 코드 체크아웃 중...</i>'
          )
          payload = json.dumps({'chat_id':'${TG_CHAT}','text':msg,'parse_mode':'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request('https://api.telegram.org/bot${TG_TOKEN}/sendMessage', data=payload, headers={'Content-Type':'application/json; charset=utf-8'})
          resp = json.loads(urllib.request.urlopen(req).read().decode('utf-8'))
          print(resp['result']['message_id'])
          " > /tmp/tg_msg_id.txt
          echo "msg_id=$(cat /tmp/tg_msg_id.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update progress - analyzing
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
        run: |
          TITLE=$(echo '${{ github.event.issue.title }}' | sed 's/[<>&]//g')
          NUM=${{ github.event.issue.number }}
          python3 -c "
          import urllib.request, json
          msg = (
            '<b>🤖 Claude Code 작업 진행 중</b>\n\n'
            '📋 Issue #${NUM}\n'
            '📝 ${TITLE}\n\n'
            '✅ 1/4 — 코드 체크아웃 완료\n'
            '⏳ <i>2/4 — Claude가 코드 분석 및 수정 중...</i>\n\n'
            '🕐 최대 30분 소요'
          )
          payload = json.dumps({'chat_id':'${TG_CHAT}','message_id':int('${MSG_ID}'),'text':msg,'parse_mode':'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request('https://api.telegram.org/bot${TG_TOKEN}/editMessageText', data=payload, headers={'Content-Type':'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          "

      - uses: anthropics/claude-code-action@beta
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            다음 수정 요청을 처리해주세요:

            ${{ github.event.issue.body }}

            규칙:
            - index.html 파일을 직접 수정하세요
            - 기존 기능을 절대 제거하지 마세요
            - 수정 완료 후 변경 내용을 한국어로 요약해주세요
          allowed_tools: "Edit,Read,Glob,Grep,Write,Bash(git diff:*),Bash(git status:*)"
          timeout_minutes: 30

      - name: Update progress - creating PR
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
        run: |
          TITLE=$(echo '${{ github.event.issue.title }}' | sed 's/[<>&]//g')
          NUM=${{ github.event.issue.number }}
          python3 -c "
          import urllib.request, json
          msg = (
            '<b>🤖 Claude Code 작업 진행 중</b>\n\n'
            '📋 Issue #${NUM}\n'
            '📝 ${TITLE}\n\n'
            '✅ 1/4 — 코드 체크아웃 완료\n'
            '✅ 2/4 — Claude 코드 수정 완료\n'
            '⏳ <i>3/4 — PR 생성 중...</i>'
          )
          payload = json.dumps({'chat_id':'${TG_CHAT}','message_id':int('${MSG_ID}'),'text':msg,'parse_mode':'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request('https://api.telegram.org/bot${TG_TOKEN}/editMessageText', data=payload, headers={'Content-Type':'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          "

      - name: Notify success
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
        run: |
          TITLE=$(echo '${{ github.event.issue.title }}' | sed 's/[<>&]//g')
          NUM=${{ github.event.issue.number }}
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 -c "
          import urllib.request, json
          msg = (
            '<b>✅ Claude Code 작업 완료!</b>\n\n'
            '📋 Issue #${NUM}\n'
            '📝 ${TITLE}\n\n'
            '✅ 1/4 — 코드 체크아웃 완료\n'
            '✅ 2/4 — Claude 코드 수정 완료\n'
            '✅ 3/4 — PR 생성 완료\n'
            '✅ 4/4 — 모든 작업 완료!\n\n'
            '🔀 PR이 생성되었습니다. 머지 준비되면 알림이 올 거예요.\n'
            '🔗 <a href=\"${RUN_URL}\">Actions 로그</a>'
          )
          payload = json.dumps({'chat_id':'${TG_CHAT}','message_id':int('${MSG_ID}'),'text':msg,'parse_mode':'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request('https://api.telegram.org/bot${TG_TOKEN}/editMessageText', data=payload, headers={'Content-Type':'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          "

      - name: Notify failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
        run: |
          TITLE=$(echo '${{ github.event.issue.title }}' | sed 's/[<>&]//g')
          NUM=${{ github.event.issue.number }}
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 -c "
          import urllib.request, json
          msg_id = '${MSG_ID}'.strip()
          msg = (
            '<b>❌ Claude Code 작업 실패</b>\n\n'
            '📋 Issue #${NUM}\n'
            '📝 ${TITLE}\n\n'
            '⚠️ 작업 중 오류가 발생했습니다.\n'
            '🔗 <a href=\"${RUN_URL}\">로그 확인</a>'
          )
          if msg_id and msg_id != '':
            payload = json.dumps({'chat_id':'${TG_CHAT}','message_id':int(msg_id),'text':msg,'parse_mode':'HTML'}, ensure_ascii=False).encode('utf-8')
            req = urllib.request.Request('https://api.telegram.org/bot${TG_TOKEN}/editMessageText', data=payload, headers={'Content-Type':'application/json; charset=utf-8'})
          else:
            payload = json.dumps({'chat_id':'${TG_CHAT}','text':msg,'parse_mode':'HTML'}, ensure_ascii=False).encode('utf-8')
            req = urllib.request.Request('https://api.telegram.org/bot${TG_TOKEN}/sendMessage', data=payload, headers={'Content-Type':'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          "
