name: Claude Code Auto-Fix

on:
  issues:
    types: [opened]

jobs:
  claude-fix:
    if: contains(github.event.issue.labels.*.name, 'claude-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Notify start
        id: tg_start
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html
          token = os.environ['TG_TOKEN']
          chat = os.environ['TG_CHAT']
          title = html.escape(os.environ.get('ISSUE_TITLE', ''))
          num = os.environ.get('ISSUE_NUM', '?')
          msg = (
            f'<b>🤖 Claude Code 작업 시작</b>\n\n'
            f'📋 Issue #{num}\n'
            f'📝 {title}\n\n'
            f'⏳ <i>1/4 — 코드 체크아웃 중...</i>'
          )
          payload = json.dumps({'chat_id': chat, 'text': msg, 'parse_mode': 'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(f'https://api.telegram.org/bot{token}/sendMessage', data=payload, headers={'Content-Type': 'application/json; charset=utf-8'})
          resp = json.loads(urllib.request.urlopen(req).read().decode('utf-8'))
          msg_id = resp['result']['message_id']
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'msg_id={msg_id}\n')
          PYEOF

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update progress - analyzing
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html
          token = os.environ['TG_TOKEN']
          chat = os.environ['TG_CHAT']
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = html.escape(os.environ.get('ISSUE_TITLE', ''))
          num = os.environ.get('ISSUE_NUM', '?')
          if not msg_id: exit(0)
          msg = (
            f'<b>🤖 Claude Code 작업 진행 중</b>\n\n'
            f'📋 Issue #{num}\n'
            f'📝 {title}\n\n'
            f'✅ 1/4 — 코드 체크아웃 완료\n'
            f'⏳ <i>2/4 — Claude가 코드 분석 및 수정 중...</i>\n\n'
            f'🕐 최대 30분 소요'
          )
          payload = json.dumps({'chat_id': chat, 'message_id': int(msg_id), 'text': msg, 'parse_mode': 'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(f'https://api.telegram.org/bot{token}/editMessageText', data=payload, headers={'Content-Type': 'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          PYEOF

      - uses: anthropics/claude-code-action@beta
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            다음 수정 요청을 처리해주세요:

            ${{ github.event.issue.body }}

            규칙:
            - index.html 파일을 직접 수정하세요
            - 기존 기능을 절대 제거하지 마세요
            - 수정 완료 후 변경 내용을 한국어로 요약해주세요
          allowed_tools: "Edit,Read,Glob,Grep,Write,Bash(git diff:*),Bash(git status:*)"
          timeout_minutes: 30

      - name: Update progress - creating PR
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html
          token = os.environ['TG_TOKEN']
          chat = os.environ['TG_CHAT']
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = html.escape(os.environ.get('ISSUE_TITLE', ''))
          num = os.environ.get('ISSUE_NUM', '?')
          if not msg_id: exit(0)
          msg = (
            f'<b>🤖 Claude Code 작업 진행 중</b>\n\n'
            f'📋 Issue #{num}\n'
            f'📝 {title}\n\n'
            f'✅ 1/4 — 코드 체크아웃 완료\n'
            f'✅ 2/4 — Claude 코드 수정 완료\n'
            f'⏳ <i>3/4 — PR 생성 중...</i>'
          )
          payload = json.dumps({'chat_id': chat, 'message_id': int(msg_id), 'text': msg, 'parse_mode': 'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(f'https://api.telegram.org/bot{token}/editMessageText', data=payload, headers={'Content-Type': 'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          PYEOF

      - name: Notify success
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html
          token = os.environ['TG_TOKEN']
          chat = os.environ['TG_CHAT']
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = html.escape(os.environ.get('ISSUE_TITLE', ''))
          num = os.environ.get('ISSUE_NUM', '?')
          run_url = os.environ.get('RUN_URL', '')
          msg = (
            f'<b>✅ Claude Code 작업 완료!</b>\n\n'
            f'📋 Issue #{num}\n'
            f'📝 {title}\n\n'
            f'✅ 1/4 — 코드 체크아웃 완료\n'
            f'✅ 2/4 — Claude 코드 수정 완료\n'
            f'✅ 3/4 — PR 생성 완료\n'
            f'✅ 4/4 — 모든 작업 완료!\n\n'
            f'🔀 PR이 생성되었습니다.\n'
            f'🔗 <a href="{run_url}">Actions 로그</a>'
          )
          method = 'editMessageText' if msg_id else 'sendMessage'
          p = {'chat_id': chat, 'text': msg, 'parse_mode': 'HTML'}
          if msg_id: p['message_id'] = int(msg_id)
          payload = json.dumps(p, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(f'https://api.telegram.org/bot{token}/{method}', data=payload, headers={'Content-Type': 'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          PYEOF

      - name: Notify failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG_ID: ${{ steps.tg_start.outputs.msg_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html
          token = os.environ['TG_TOKEN']
          chat = os.environ['TG_CHAT']
          msg_id = os.environ.get('MSG_ID', '').strip()
          title = html.escape(os.environ.get('ISSUE_TITLE', ''))
          num = os.environ.get('ISSUE_NUM', '?')
          run_url = os.environ.get('RUN_URL', '')
          msg = (
            f'<b>❌ Claude Code 작업 실패</b>\n\n'
            f'📋 Issue #{num}\n'
            f'📝 {title}\n\n'
            f'⚠️ 작업 중 오류가 발생했습니다.\n'
            f'🔗 <a href="{run_url}">로그 확인</a>'
          )
          method = 'editMessageText' if msg_id else 'sendMessage'
          p = {'chat_id': chat, 'text': msg, 'parse_mode': 'HTML'}
          if msg_id: p['message_id'] = int(msg_id)
          payload = json.dumps(p, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(f'https://api.telegram.org/bot{token}/{method}', data=payload, headers={'Content-Type': 'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          PYEOF
