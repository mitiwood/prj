name: Notify PR to Telegram

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html
          token = os.environ['TG_TOKEN']
          chat = os.environ['TG_CHAT']
          title = html.escape(os.environ.get('PR_TITLE', ''))
          num = os.environ.get('PR_NUM', '?')
          url = os.environ.get('PR_URL', '')
          author = os.environ.get('PR_AUTHOR', '')
          msg = (
            f'<b>🔀 새 PR 생성됨</b>\n\n'
            f'📋 #{num}: {title}\n'
            f'👤 {author}\n\n'
            f'머지하려면 텔레그램에서:\n'
            f'<code>머지 {num}</code>\n\n'
            f'🔗 <a href="{url}">PR 보기</a>'
          )
          payload = json.dumps({'chat_id': chat, 'text': msg, 'parse_mode': 'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(f'https://api.telegram.org/bot{token}/sendMessage', data=payload, headers={'Content-Type': 'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          PYEOF
