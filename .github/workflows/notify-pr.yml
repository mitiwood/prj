name: Notify PR to Telegram

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification (Telegram + Kakao)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          SITE_URL: https://ai-music-studio-bice.vercel.app
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, html

          title = os.environ.get('PR_TITLE', '')
          num = os.environ.get('PR_NUM', '?')
          url = os.environ.get('PR_URL', '')
          author = os.environ.get('PR_AUTHOR', '')
          site = os.environ.get('SITE_URL', '')
          secret = os.environ.get('ADMIN_SECRET', 'kenny2024!')

          import html as html_mod

          def esc(s): return html_mod.escape(str(s))

          # Telegram — HTML + 인라인 키보드
          try:
            tg_msg = f'\U0001f500 <b>새 PR #{esc(num)} 생성</b>\n\n\U0001f4dd {esc(title)}\n\U0001f464 작성자: {esc(author)}'
            keyboard = {'inline_keyboard': [
              [{'text': '\U0001f517 PR 보기', 'url': url}, {'text': '\U0001f310 사이트', 'url': site}]
            ]}
            tg = json.dumps({'text': tg_msg, 'parse_mode': 'HTML', 'reply_markup': keyboard}, ensure_ascii=False).encode('utf-8')
            req = urllib.request.Request(f'{site}/api/telegram', data=tg, headers={'Content-Type': 'application/json; charset=utf-8', 'Authorization': f'Bearer {secret}'})
            urllib.request.urlopen(req)
            print('Telegram OK')
          except Exception as e:
            print(f'Telegram error: {e}')

          # Kakao
          try:
            kakao_msg = f'\U0001f500 새 PR #{num}\n\n{title}\n작성자: {author}\n\n{url}'
            kp = json.dumps({'text': kakao_msg}, ensure_ascii=False).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(f'{site}/api/kakao-notify', data=kp, headers={'Content-Type': 'application/json; charset=utf-8'}))
            print('Kakao OK')
          except Exception as e:
            print(f'Kakao error: {e}')
          PYEOF
