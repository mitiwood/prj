name: Notify PR to Telegram

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PR_TITLE=$(echo '${{ github.event.pull_request.title }}' | sed 's/[<>&]//g')
          PR_NUM=${{ github.event.pull_request.number }}
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          python3 -c "
          import urllib.request, json
          msg = (
            '<b>🔀 새 PR 생성됨</b>\n\n'
            '📋 #${PR_NUM}: ${PR_TITLE}\n'
            '👤 ${PR_AUTHOR}\n\n'
            '머지하려면 텔레그램에서:\n'
            '<code>머지 ${PR_NUM}</code>\n\n'
            '🔗 <a href=\"${PR_URL}\">PR 보기</a>'
          )
          payload = json.dumps({'chat_id':'${TG_CHAT}','text':msg,'parse_mode':'HTML'}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request('https://api.telegram.org/bot${TG_TOKEN}/sendMessage', data=payload, headers={'Content-Type':'application/json; charset=utf-8'})
          urllib.request.urlopen(req)
          "
